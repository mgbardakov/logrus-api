databaseChangeLog:
  - changeSet:
      id: 10-create-review-items
      author: logrus
      changes:
        - createTable:
            tableName: review_items
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: target_type
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: target_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  defaultValue: OPEN
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: integer
                  defaultValueNumeric: 3
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: text
              - column:
                  name: assigned_user_id
                  type: uuid
                  constraints:
                    foreignKeyName: fk_review_items_assigned_user
                    references: users(id)
              - column:
                  name: resolved_at
                  type: timestamptz
              - column:
                  name: metadata
                  type: jsonb
                  defaultValueComputed: "'{}'::jsonb"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - sql:
            sql: ALTER TABLE review_items ADD CONSTRAINT chk_review_items_target_type CHECK (target_type in ('EVENT', 'RELATION', 'HYPOTHESIS', 'BRIEF'));
        - sql:
            sql: ALTER TABLE review_items ADD CONSTRAINT chk_review_items_status CHECK (status in ('OPEN', 'IN_REVIEW', 'APPROVED', 'REJECTED'));
        - createIndex:
            tableName: review_items
            indexName: idx_review_items_target
            columns:
              - column:
                  name: target_type
              - column:
                  name: target_id
        - createIndex:
            tableName: review_items
            indexName: idx_review_items_status_priority
            columns:
              - column:
                  name: status
              - column:
                  name: priority
