databaseChangeLog:
  - changeSet:
      id: 3-create-sources
      author: logrus
      changes:
        - createTable:
            tableName: sources
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: varchar(128)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: source_type
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: base_url
                  type: text
              - column:
                  name: priority
                  type: varchar(16)
                  defaultValue: P0
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: config
                  type: jsonb
                  defaultValueComputed: "'{}'::jsonb"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - sql:
            sql: ALTER TABLE sources ADD CONSTRAINT chk_sources_priority CHECK (priority in ('P0', 'P1', 'P2'));

  - changeSet:
      id: 3-create-source-runs
      author: logrus
      changes:
        - createTable:
            tableName: source_runs
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: source_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_source_runs_source
                    references: sources(id)
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: finished_at
                  type: timestamptz
              - column:
                  name: error_message
                  type: text
              - column:
                  name: metadata
                  type: jsonb
                  defaultValueComputed: "'{}'::jsonb"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - sql:
            sql: ALTER TABLE source_runs ADD CONSTRAINT chk_source_runs_status CHECK (status in ('PENDING', 'RUNNING', 'SUCCEEDED', 'FAILED'));
        - createIndex:
            tableName: source_runs
            indexName: idx_source_runs_source_id
            columns:
              - column:
                  name: source_id
