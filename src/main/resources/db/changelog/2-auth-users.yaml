databaseChangeLog:
  - changeSet:
      id: 2-create-workspaces
      author: logrus
      changes:
        - createTable:
            tableName: workspaces
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: varchar(64)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

  - changeSet:
      id: 2-create-users
      author: logrus
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workspace_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_users_workspace
                    references: workspaces(id)
              - column:
                  name: email
                  type: varchar(320)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: display_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(32)
                  defaultValue: USER
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - sql:
            sql: ALTER TABLE users ADD CONSTRAINT chk_users_role CHECK (role in ('USER', 'ANALYST', 'ADMIN'));
        - sql:
            sql: ALTER TABLE users ADD CONSTRAINT chk_users_status CHECK (status in ('ACTIVE', 'DISABLED'));
        - createIndex:
            tableName: users
            indexName: idx_users_workspace_id
            columns:
              - column:
                  name: workspace_id
